version: "2"
run:
  tests: false

formatters:
  enable:
    - gci
    - gofmt
    - gofumpt
    # goimports is intentionally NOT enabled. It enforces an explicit `avro`
    # alias on every `github.com/confluentinc/confluent-avro-go/v2` import
    # because the path's last segment ("v2") differs from the package name.
    # This is a goimports/gci stylistic preference, not a Go-language rule —
    # `import "..../v2"` works fine without an alias since the compiler uses
    # the actual `package avro` declaration. Adopting the alias would touch
    # ~55 files and the convention is not standard across Go. gci handles
    # import grouping/sorting on its own.
  settings:
    gofumpt:
      extra-rules: true
  exclusions:
    generated: lax

linters:
  default: all
  disable:
    - cyclop    # duplicate of gocyclo
    - depguard
    - err113
    - exhaustive
    - exhaustruct
    - forcetypeassert
    - funlen
    - funcorder
    - gochecknoglobals
    - gochecknoinits
    - gocognit
    - goconst
    - gocyclo
    - gosmopolitan
    - inamedparam
    - interfacebloat
    - ireturn
    - mnd
    - nestif
    - nlreturn
    - noinlineerr
    - nonamedreturns
    - tagliatelle
    - varnamelen
    - wrapcheck
    - wsl
    - wsl_v5
  settings:
    gosec:
      excludes:
        - G115
        - G103
  exclusions:
    generated: lax
    rules:
      - linters:
          - gosec
        path: (schema|protocol)\.go
      - path: (.+)\.go$
        text: 'package-comments: should have a package comment'
